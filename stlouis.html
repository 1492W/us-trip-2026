<style>
  :root{--bg:#0C0F14;--surface:#161B24;--surface-hover:#1D2330;--border:#262D3A;--text:#E8ECF2;--text-dim:#8892A4;--accent:#E85B5B;--accent-glow:rgba(232,91,91,0.15);--green:#5CBF8A;--blue:#5B9FD6;--rose:#D67B8A;--purple:#A07BD6;--sky:#6BB8E8;--orange:#F0A050}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
  .hero{position:relative;padding:52px 24px 16px;text-align:center;overflow:hidden}
  .hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 50% 20%,rgba(232,91,91,0.08)0%,transparent 60%),radial-gradient(ellipse at 80% 60%,rgba(240,160,80,0.05)0%,transparent 50%);pointer-events:none}
  .hero-label{display:inline-block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:3px;color:var(--accent);background:var(--accent-glow);padding:6px 16px;border-radius:20px;position:relative}
  .hero h1{font-family:'DM Serif Display',serif;font-size:clamp(34px,8vw,52px);font-weight:400;line-height:1.15;margin-bottom:10px;position:relative}
  .hero h1 span{color:var(--accent)}
  .hero-sub{font-size:14px;color:var(--text-dim);position:relative}
  .hotel-badge,.flight-badge{display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:11px;color:var(--text-dim);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 14px;position:relative}
  .hotel-badge{font-size:12px;margin-top:14px}
  .tabs{display:flex;gap:6px;padding:0 16px;margin:20px auto 0;max-width:700px;justify-content:center;flex-wrap:wrap}
  .tab{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 10px;cursor:pointer;transition:all .3s ease;text-align:center;flex:1;min-width:60px;max-width:120px;user-select:none}
  .tab:hover{background:var(--surface-hover)}
  .tab.active{border-color:var(--accent);background:var(--accent-glow)}
  .tab-day{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);margin-bottom:3px}
  .tab.active .tab-day{color:var(--accent)}
  .tab-title{font-size:11px;font-weight:600;color:var(--text)}
  .tab-date{font-size:10px;color:var(--text-dim);margin-top:2px}
  .tc{max-width:600px;margin:28px auto;padding:0 20px 40px}
  .day-hdr{margin-bottom:20px}.day-hdr h2{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;margin-bottom:4px}.day-hdr p{font-size:13px;color:var(--text-dim)}
  .weather-card{background:linear-gradient(135deg,#1a2233,#162030);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:8px;animation:fadeIn .5s ease}
  .weather-summary{font-size:15px;font-weight:600;margin-bottom:10px}
  .weather-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}
  .weather-metric{text-align:center;font-size:12px;color:var(--text-dim)}
  .weather-metric b{display:block;font-size:14px;color:var(--text);margin-bottom:2px}
  .temp-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;font-size:13px;font-weight:600}
  .temp-cold{background:rgba(91,159,214,0.12);color:#6BB8E8}
  .temp-cool{background:rgba(91,184,232,0.12);color:#5BB8E8}
  .temp-warm{background:rgba(240,160,80,0.12);color:#F0A050}
  .temp-hot{background:rgba(232,91,91,0.12);color:#E85B5B}
  .outfit-tip{font-size:12px;color:var(--text-dim);line-height:1.5;margin-top:8px;padding:10px 12px;background:var(--surface);border-radius:10px}
  .outfit-tip strong{color:var(--text)}
  .timeline{position:relative;padding-left:24px;margin-top:20px}
  .timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border)}
  .stop{position:relative;margin-bottom:20px;animation:fadeIn .4s ease}
  .stop-dot{position:absolute;left:-20px;top:6px;width:12px;height:12px;border-radius:50%;border:2px solid var(--border);background:var(--bg)}
  .stop-dot.green{border-color:var(--green);box-shadow:0 0 6px rgba(92,191,138,0.3)}.stop-dot.blue{border-color:var(--blue);box-shadow:0 0 6px rgba(91,159,214,0.3)}.stop-dot.accent{border-color:var(--accent);box-shadow:0 0 6px rgba(232,91,91,0.3)}.stop-dot.rose{border-color:var(--rose);box-shadow:0 0 6px rgba(214,123,138,0.3)}.stop-dot.orange{border-color:var(--orange);box-shadow:0 0 6px rgba(240,160,80,0.3)}.stop-dot.purple{border-color:var(--purple);box-shadow:0 0 6px rgba(160,123,214,0.3)}
  .stop-time{font-size:11px;color:var(--text-dim);font-weight:600;letter-spacing:1px}
  .stop-name{font-size:16px;font-weight:700;margin:4px 0 2px}
  .stop-brief{font-size:13px;color:var(--text-dim)}
  .stop-tag{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;margin-left:8px;vertical-align:middle}
  .tag-free{background:rgba(92,191,138,0.15);color:var(--green)}.tag-food{background:rgba(214,123,138,0.15);color:var(--rose)}.tag-booked{background:rgba(240,160,80,0.15);color:var(--orange)}.tag-vex{background:rgba(160,123,214,0.15);color:var(--purple)}
  .stop-detail{display:none;margin-top:10px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:13px;line-height:1.7;color:var(--text-dim)}
  .stop-detail strong{color:var(--text)}.stop-detail.open{display:block;animation:fadeIn .3s ease}
  .stop-transit{font-size:12px;color:var(--sky);margin-top:6px}
  .stop-tip{font-size:12px;color:var(--orange);margin-top:8px;padding:8px 12px;background:rgba(240,160,80,0.06);border-radius:8px;border-left:3px solid var(--orange)}
  .notes-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:24px;font-size:13px;line-height:1.7;color:var(--text-dim)}
  .notes-card strong{color:var(--text)}
  .toggle-btn{display:inline-block;font-size:11px;color:var(--accent);cursor:pointer;margin-top:6px;font-weight:600}
  .back-link{display:inline-flex;align-items:center;gap:6px;margin:20px;font-size:13px;color:var(--text-dim);text-decoration:none;transition:color .2s}
  .back-link:hover{color:var(--accent)}
  .lang-toggle{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:700;color:var(--accent);z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

function showDay(idx){
  curDay=idx;document.querySelectorAll(".tab").forEach(function(t,i){t.classList.toggle("active",i===idx)});
  var d=days[idx],c=document.getElementById("content"),L=isEN;
  var h='<div class="day-hdr"><h2>'+(L?d.en_title:d.title)+'</h2><p>'+(L?d.en_subtitle:d.subtitle)+'</p></div>';
  var w=d.weather;
  h+='<div class="weather-card"><div class="weather-summary">'+(L?w.en_summary:w.summary)+'</div>';
  h+='<div class="weather-grid">';
  w.temps.forEach(function(t){h+='<div class="weather-metric"><b><span class="temp-pill '+t.cls+'">'+t.deg+'°</span></b>'+(L?t.en_label:t.label)+'<br>'+t.time+'</div>'});
  h+='</div>';
  h+='<div class="weather-grid"><div class="weather-metric"><b>'+w.wind+'</b>'+(L?'Wind':'ลม')+'</div><div class="weather-metric"><b>'+w.rain+'</b>'+(L?'Rain':'ฝน')+'</div><div class="weather-metric"><b>'+w.sunrise+'</b>'+(L?'Sunrise':'☀️ ขึ้น')+'</div></div>';
  h+='<div class="outfit-tip">'+(L?w.en_outfit:w.outfit)+'</div></div>';
  h+='<div class="timeline">';
  d.stops.forEach(function(s,i){
    h+='<div class="stop" onclick="toggleDetail('+idx+','+i+')">';
    h+='<div class="stop-dot '+(s.color||'')+'"></div>';
    if(s.time)h+='<div class="stop-time">'+s.time+'</div>';
    h+='<div class="stop-name">'+s.name;
    if(s.tag)h+='<span class="stop-tag '+s.tag.cls+'">'+s.tag.text+'</span>';
    h+='</div>';
    h+='<div class="stop-brief">'+(L?s.en_brief:s.brief)+'</div>';
    h+='<div class="stop-detail" id="detail-'+idx+'-'+i+'">';
    if(s.transit)h+='<div class="stop-transit">'+(L?(s.en_transit||s.transit):s.transit)+'</div>';
    h+='<div style="margin-top:8px">'+(L?(s.en_details||s.details||''):s.details||'')+'</div>';
    if(s.tip)h+='<div class="stop-tip">'+(L?(s.en_tip||s.tip):s.tip)+'</div>';
    h+='</div></div>'});
  h+='</div>';
  if(d.notes)h+='<div class="notes-card">📝 '+(L?d.en_notes:d.notes)+'</div>';
  c.innerHTML=h;
}
function toggleDetail(d,s){var el=document.getElementById("detail-"+d+"-"+s);if(el)el.classList.toggle("open")}

];
tabLabels.forEach(function(t,i){

  div.innerHTML='<div class="tab-day">'+t.day+'</div><div class="tab-title">'+t.title+'</div><div class="tab-date">'+t.date+'</div>';
  div.onclick=function(){showDay(i)};
  tabsEl.appendChild(div)});
showDay(0);
